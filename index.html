<body>
<header>
  <h1>分子可视化工具</h1>
  <nav>
    <ul>
      <li><a href="index.html">首页</a></li>

<main>
  
<section>
  <h2>快速启动的3D查看器</h2>
  <div style="display:flex; gap:var(--spacing); flex-wrap:wrap; align-items:center;">
    <div style="flex:1; min-width:300px;">
      <canvas id="molCanvas" width="500" height="400" style="border:1px solid #e5e7eb; border-radius:var(--radius-card);"></canvas>
    </div>
    <div style="flex:0 0 200px;">
      <label for="molSelect" style="display:block; margin-bottom:var(--spacing);">选择分子：</label>
      <select id="molSelect" style="width:100%; padding:var(--spacing); border-radius:var(--radius-btn); border:1px solid #d1d5db; background:#fff;">
        <option value="water">水 (H2O)</option>
        <option value="methane">甲烷 (CH4)</option>
        <option value="benzene">苯 (C6H6)</option>
      </select>
      <button id="resetView" style="width:100%; margin-top:var(--spacing); padding:var(--spacing); background:var(--primary); color:#fff; border:none; border-radius:var(--radius-btn); cursor:pointer;">重置视角</button>
    </div>
  </div>
</section>

<section>
  <h2>功能导航</h2>
  <div style="display:flex; gap:var(--spacing); flex-wrap:wrap;">
    <a href="upload.html?id=home" style="flex:1 1 150px; text-align:center; background:var(--primary); color:#fff; padding:var(--spacing) calc(var(--spacing)*2); border-radius:var(--radius-btn); text-decoration:none; font-weight:500;">上传分子文件</a>
    <a href="editor.html?id=home" style="flex:1 1 150px; text-align:center; background:var(--primary); color:#fff; padding:var(--spacing) calc(var(--spacing)*2); border-radius:var(--radius-btn); text-decoration:none; font-weight:500;">分子编辑器</a>
    <a href="analysis.html?id=home" style="flex:1 1 150px; text-align:center; background:var(--primary); color:#fff; padding:var(--spacing) calc(var(--spacing)*2); border-radius:var(--radius-btn); text-decoration:none; font-weight:500;">结果分析</a>
    <a href="export.html?id=home" style="flex:1 1 150px; text-align:center; background:var(--primary); color:#fff; padding:var(--spacing) calc(var(--spacing)*2); border-radius:var(--radius-btn); text-decoration:none; font-weight:500;">导出与保存</a>
  </div>
</section>

<script>
  const canvas = document.getElementById('molCanvas');
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvas.height;

  let rotX = 0, rotY = 0;
  let distance = 400;
  const focal = 400;

  const molecules = {
    water: [
      {element:'O', pos:[0,0,0], radius:0.6, color:'#ff0000'},
      {element:'H', pos:[0.76,0.58,0], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[-0.76,0.58,0], radius:0.3, color:'#ffff00'}
    ],
    methane: [
      {element:'C', pos:[0,0,0], radius:0.7, color:'#808080'},
      {element:'H', pos:[0.63,0.63,0.63], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[0.63,-0.63,-0.63], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[-0.63,0.63,-0.63], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[-0.63,-0.63,0.63], radius:0.3, color:'#ffff00'}
    ],
    benzene: [
      {element:'C', pos:[0,0,1.2], radius:0.7, color:'#808080'},
      {element:'C', pos:[1.04,0,0.6], radius:0.7, color:'#808080'},
      {element:'C', pos:[1.04,0,-0.6], radius:0.7, color:'#808080'},
      {element:'C', pos:[0,0,-1.2], radius:0.7, color:'#808080'},
      {element:'C', pos:[-1.04,0,-0.6], radius:0.7, color:'#808080'},
      {element:'C', pos:[-1.04,0,0.6], radius:0.7, color:'#808080'},
      {element:'H', pos:[0,0,2.1], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[1.85,0,1.05], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[1.85,0,-1.05], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[0,0,-2.1], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[-1.85,0,-1.05], radius:0.3, color:'#ffff00'},
      {element:'H', pos:[-1.85,0,1.05], radius:0.3, color:'#ffff00'}
    ]
  };

  function project(point) {
    const x = point[0];
    const y = point[1];
    const z = point[2];
    // rotate around Y then X
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const x1 = x * cosY + z * sinY;
    const z1 = -x * sinY + z * cosY;
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    const y1 = y * cosX - z1 * sinX;
    const z2 = y * sinX + z1 * cosX;
    const scale = focal / (focal + z2 + distance);
    return {
      x: x1 * scale + width / 2,
      y: -y1 * scale + height / 2,
      scale: scale
    };
  }

  function drawMolecule(type) {
    ctx.clearRect(0,0,width,height);
    const atoms = molecules[type];
    atoms.forEach(atom => {
      const p = project(atom.pos);
      const radius = atom.radius * p.scale;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI*2);
      ctx.fillStyle = atom.color;
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 0.5 * p.scale;
      ctx.stroke();
    });
    // draw bonds (simple: connect consecutive atoms for demo)
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    for (let i=0; i<atoms.length-1; i++) {
      const a = project(atoms[i].pos);
      const b = project(atoms[i+1].pos);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
    // close ring for benzene
    if (type === 'benzene' && atoms.length > 2) {
      const a = project(atoms[0].pos);
      const b = project(atoms[atoms.length-1].pos);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
  }

  const molSelect = document.getElementById('molSelect');
  const resetBtn = document.getElementById('resetView');

  molSelect.addEventListener('change', e => {
    drawMolecule(e.target.value);
  });
  resetBtn.addEventListener('click', () => {
    rotX = 0; rotY = 0; distance = 400;
    drawMolecule(molSelect.value);
  });

  let isDragging = false;
  let lastX, lastY;
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
  });
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    rotY += dx * 0.01;
    rotX += dy * 0.01;
    lastX = e.clientX;
    lastY = e.clientY;
    drawMolecule(molSelect.value);
  });
  canvas.addEventListener('mouseup', () => isDragging = false);
  canvas.addEventListener('mouseleave', () => isDragging = false);
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 10 : -10;
    distance = Math.max(100, Math.distance? distance + delta : distance + delta);
    drawMolecule(molSelect.value);
  });

  // init
  drawMolecule(molSelect.value);
</script>

</main>
